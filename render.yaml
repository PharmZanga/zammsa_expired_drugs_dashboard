services:
  - type: web
    name: zammsa-expiry-salvage-dashboard
    runtime: static
    buildCommand: echo Static dashboard ready
    staticPublishPath: .
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
